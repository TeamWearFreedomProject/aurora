name: Build MSM Kernel (Monaco)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: 'recursive'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            ccache \
            git \
            zip \
            unzip

      - name: Setup defconfig
        run: |
          mkdir -p external/linux-msm/arch/arm64/configs/vendor/
          cp defconfig external/linux-msm/arch/arm64/configs/vendor/monaco-perf_defconfig
          cp defconfig external/linux-msm/arch/arm64/configs/vendor/monaco_defconfig
          
          # ハードコードされた initramfs のパスを空に置き換える
          sed -i 's|CONFIG_INITRAMFS_SOURCE=.*|CONFIG_INITRAMFS_SOURCE=""|g' external/linux-msm/arch/arm64/configs/vendor/monaco*

      - name: Diagnose drivers/clk/qcom/trace.h presence
        working-directory: external/linux-msm
        run: |
          echo "=== trace.h存在確認 ==="
          ls -la drivers/clk/qcom/trace.h 2>&1 || echo "ファイルが存在しません"
          echo "=== シンボリックリンク確認 ==="
          find drivers/clk/qcom -maxdepth 1 -type l -exec ls -la {} \;
          echo "=== Makefile内のccflags確認 ==="
          grep -n "ccflags\|CFLAGS_clk-debug\|clk-debug" drivers/clk/qcom/Makefile

      - name: Build Monaco Kernel
        working-directory: external/linux-msm
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          CONFIG_PATH=$(find arch/arm64/configs -type f -name "*monaco*defconfig" | head -n 1)

          if [ -n "$CONFIG_PATH" ]; then
            TARGET_CONFIG=${CONFIG_PATH#arch/arm64/configs/}
            echo "Found defconfig: $TARGET_CONFIG"
            make $TARGET_CONFIG
          else
            echo "monaco defconfig not found. Trying fallback..."
            make vendor/monaco-perf_defconfig || make vendor/monaco_defconfig
          fi

          # このカーネルツリーは複数のディレクトリ(drivers/clk/qcom, drivers/soc/qcom/dcvs 等)で
          # 同様に trace*.h の相対インクルード(./trace.h 等)を使っており、
          # 該当ディレクトリの Makefile に -I(src) 相当の指定が軒並み欠落している。
          # CREATE_TRACE_POINTS を使う *.c を含む全ディレクトリの Makefile に
          # ccflags-y += -I$(src) を一括注入して回避する。
          echo "=== -I(src) 欠落ディレクトリを検索して一括修正します ==="
          for tracefile in $(grep -rl "CREATE_TRACE_POINTS" --include="*.c" drivers kernel sound net block fs mm 2>/dev/null); do
            dir=$(dirname "$tracefile")
            mfile="$dir/Makefile"
            if [ -f "$mfile" ]; then
              if ! grep -q 'ccflags-y.*-I\$(src)' "$mfile"; then
                echo "" >> "$mfile"
                echo 'ccflags-y += -I$(src)' >> "$mfile"
                echo "  patched: $mfile"
              fi
            fi
          done
          make -j$(nproc) Image modules KCFLAGS="-w" || {
            echo "並列ビルドで失敗。原因を確認します。"

            # drivers/soc/qcom/sps は未定義マクロによりビルドが通らないことがある。
            # Monaco(SW5100)には本質的に不要な古いQualcommドライバのため、
            # このドライバを無効化して再ビルドする。
            if grep -q "CONFIG_SPS=y\|CONFIG_SPS=m" .config 2>/dev/null; then
              echo "CONFIG_SPS を無効化して再試行します。"
              scripts/config --file .config --disable CONFIG_SPS 2>/dev/null || \
                sed -i 's/^CONFIG_SPS=.*/# CONFIG_SPS is not set/' .config
            fi

            # drivers/power/supply/qcom/pmic-voter-compat.c は
            # modules/bms サブモジュール側の misc/gvotable.h を参照するが、
            # in-treeビルドではそのインクルードパスが渡らないため失敗する。
            # 該当ドライバのビルドを無効化する。
            for cfg in CONFIG_QTI_PMIC_VOTER_COMPAT CONFIG_QPNP_QG CONFIG_SMB5 CONFIG_QPNP_FG_GEN4; do
              if grep -q "^${cfg}=y\|^${cfg}=m" .config 2>/dev/null; then
                echo "${cfg} を無効化します。"
                scripts/config --file .config --disable ${cfg} 2>/dev/null || \
                  sed -i "s/^${cfg}=.*/# ${cfg} is not set/" .config
              fi
            done

            # pmic-voter-compat.o 単体をビルド対象から明示的に除外(念のため)
            if [ -f drivers/power/supply/qcom/Makefile ]; then
              sed -i '/pmic-voter-compat/d' drivers/power/supply/qcom/Makefile
            fi

            yes "" | make oldconfig

            make -j$(nproc) Image modules KCFLAGS="-w" || {
              echo "-jで失敗。-j1でシリアルビルドして原因を切り分けます。"
              make -j1 Image modules KCFLAGS="-w" V=1
            }
          }

          # モジュールを一時ディレクトリにインストール(rootfsへの差し替え用)
          mkdir -p ../modules_install
          make -j$(nproc) INSTALL_MOD_PATH=$(pwd)/../modules_install modules_install

      - name: Upload Kernel Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: monaco-kernel-Image
          path: external/linux-msm/arch/arm64/boot/Image

      - name: Get mkbootimg (AOSP)
        run: |
          git clone --depth 1 https://android.googlesource.com/platform/system/tools/mkbootimg mkbootimg-tool

      - name: Create boot.img (header v4, no dtb)
        run: |
          set -e
          python3 mkbootimg-tool/mkbootimg.py \
            --header_version 4 \
            --kernel external/linux-msm/arch/arm64/boot/Image \
            --os_version 13.0.0 \
            --os_patch_level 2026-01 \
            --output boot.img || {
              echo "ramdiskなしで失敗。空のramdiskを作って再試行します。"
              mkdir -p empty_ramdisk_root
              (cd empty_ramdisk_root && find . | cpio -o -H newc > ../empty_ramdisk.cpio)
              python3 mkbootimg-tool/mkbootimg.py \
                --header_version 4 \
                --kernel external/linux-msm/arch/arm64/boot/Image \
                --ramdisk empty_ramdisk.cpio \
                --os_version 13.0.0 \
                --os_patch_level 2026-01 \
                --output boot.img
            }

          echo "=== boot.img info ==="
          ls -la boot.img
          file boot.img

      - name: Upload boot.img Artifact
        uses: actions/upload-artifact@v4
        with:
          name: monaco-boot-img
          path: boot.img

      - name: Download AsteroidOS rootfs (rubyfish base)
        run: |
          BASE_URL="https://release.asteroidos.org/nightlies/rubyfish"
          wget -q "${BASE_URL}/asteroid-image-rubyfish.rootfs.ext4" -O asteroid-rootfs.ext4 || \
          wget -q "https://release.asteroidos.org/2.0/rubyfish/asteroid-image-rubyfish.rootfs.ext4" -O asteroid-rootfs.ext4

          ls -la asteroid-rootfs.ext4
          file asteroid-rootfs.ext4

      - name: Inject Monaco kernel modules into rootfs
        run: |
          set -e
          sudo apt-get install -y e2fsprogs

          MODULES_SIZE_MB=$(du -sm modules_install | cut -f1)
          echo "Modules size: ${MODULES_SIZE_MB}MB"
          EXTRA_MB=$((MODULES_SIZE_MB + 200))

          e2fsck -f -y asteroid-rootfs.ext4 || true
          resize2fs asteroid-rootfs.ext4 $(( $(stat -c%s asteroid-rootfs.ext4) / 1024 / 1024 + EXTRA_MB ))M

          mkdir -p /tmp/rootfs_mnt
          sudo mount -o loop asteroid-rootfs.ext4 /tmp/rootfs_mnt

          KVER=$(ls modules_install/lib/modules)
          echo "Kernel version: $KVER"

          sudo mkdir -p /tmp/rootfs_mnt/lib/modules_rubyfish_backup
          if [ -d /tmp/rootfs_mnt/lib/modules ]; then
            sudo mv /tmp/rootfs_mnt/lib/modules/* /tmp/rootfs_mnt/lib/modules_rubyfish_backup/ 2>/dev/null || true
          fi

          sudo mkdir -p /tmp/rootfs_mnt/lib/modules
          sudo cp -r modules_install/lib/modules/$KVER /tmp/rootfs_mnt/lib/modules/

          sync
          sudo umount /tmp/rootfs_mnt

          mv asteroid-rootfs.ext4 asteroid-monaco-rootfs.ext4
          echo "=== Final rootfs info ==="
          ls -la asteroid-monaco-rootfs.ext4

      - name: Upload rootfs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: monaco-asteroid-rootfs
          path: asteroid-monaco-rootfs.ext4
